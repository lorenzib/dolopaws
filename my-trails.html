<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trails for your dog — DoloPaws</title>
<meta name="description" content="All Dolomites trails, filtered by area and matched to your dog.">
<meta name="theme-color" content="#2E4034">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="topnav">
  <a class="brand" href="index.html"><img src="logo.svg" alt="DoloPaws logo">DoloPaws</a>
  <div class="links">
    <a href="browse-trails.html" class="active">Trails</a>
    <a href="journal.html">My Journal</a>
    <a href="safety-guide.html">Safety guide</a>
    <a href="about.html">About</a>
    <button id="accountBtn" class="account-btn" data-i18n="nav.login">Log in</button>
  </div>
</div>

<div class="guide-hero">
  <div class="eyebrow">Personalised trails</div>
  <h1 id="trailCountHeading" style="font-size:clamp(28px,5vw,38px);margin-top:14px;">Trails for your dog</h1>
  <p class="sub" id="pageSubline" style="margin-top:14px;" aria-busy="true"><span class="skeleton" style="width:230px;height:13px;" aria-label="Checking your login status"></span></p>
</div>

<div id="loggedOutState" hidden style="text-align:center;padding:40px 20px;">
  <p style="font-size:15px;color:var(--ink-soft);margin-bottom:16px;">This page is available to logged-in accounts only.</p>
  <button type="button" id="myTrailsLoginBtn" class="auth-submit" style="width:auto;padding:11px 24px;">Log in</button>
</div>

<div id="loggedInState" hidden>
  <div class="wrap" style="padding-bottom:60px;">
    <div class="area-filter-row" id="areaFilterRow"></div>
    <div id="filteredTrailsList"></div>
  </div>
</div>

<footer class="site-footer" data-i18n="footer.line">DoloPaws &#124; A personalised trail guide for dogs and their humans.</footer>

<script src="i18n.js"></script>
<script type="module" src="firebase-init.js"></script>
<script src="breeds-data.js" defer></script>
<script src="trails-data.js" defer></script>
<script src="osm-trails-data.js" defer></script>
<script src="osm-trails-savoy-data.js" defer></script>
<script src="regions-config.js" defer></script>
<script src="auth-ui.js" defer></script>
<script src="my-trails.js" defer></script>
<script>
document.addEventListener('DOMContentLoaded', function(){
  var loginBtn = document.getElementById('myTrailsLoginBtn');
  if(loginBtn) loginBtn.addEventListener('click', function(){
    var accountBtn = document.getElementById('accountBtn');
    if(accountBtn) accountBtn.click();
  });
});
</script>
</body>
</html>
