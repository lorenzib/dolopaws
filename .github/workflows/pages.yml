name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deploy1
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before first retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20

      - name: Retry deploy (attempt 2)
        if: steps.deploy1.outcome == 'failure'
        id: deploy2
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before second retry
        if: steps.deploy2.outcome == 'failure'
        run: sleep 30

      - name: Retry deploy (attempt 3)
        if: steps.deploy2.outcome == 'failure'
        id: deployment
        uses: actions/deploy-pages@v5
