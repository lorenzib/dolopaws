name: Update dog-friendly routes

on:
  workflow_dispatch: {}        # adds a "Run workflow" button in the Actions tab
  schedule:
    - cron: '0 4 1 * *'        # also refreshes automatically on the 1st of each month

permissions:
  contents: write

jobs:
  fetch-routes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch dog-friendly routes — Dolomites
        run: node scripts/fetch-dog-friendly-routes.js --region dolomites --bbox-only --loops-only --max-km 12

      - name: Promote Dolomites routes to full trail entries
        run: node scripts/promote-osm-trails.js --region dolomites

      - name: Fetch dog-friendly routes — Savoy
        run: node scripts/fetch-dog-friendly-routes.js --region savoy --bbox-only --loops-only --max-km 12

      - name: Promote Savoy routes to full trail entries
        run: node scripts/promote-osm-trails.js --region savoy

      - name: Commit updated trail data
        run: |
          git config user.name "dolopaws-bot"
          git config user.email "actions@github.com"
          git add dog-friendly-routes.geojson dog-friendly-routes-savoy.geojson osm-trails-data.js osm-trails-savoy-data.js data/access-points.geojson data/access-points-savoy.geojson data/dog-route-review.json data/dog-route-review-savoy.json data/dog-route-overrides.json
          git diff --cached --quiet || git commit -m "Update dog-friendly routes and promoted trails from OSM"
          git pull --rebase origin main
          git push
