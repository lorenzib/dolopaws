name: Generate static trail pages

on:
  workflow_dispatch: {}        # "Run workflow" button in the Actions tab
  schedule:
    - cron: '0 5 1 * *'        # monthly, 1 hour after the OSM route refresh
  push:
    branches: [main]
    paths:
      - 'trails-data.js'
      - 'osm-trails-data.js'
      - 'osm-trails-savoy-data.js'
      - 'scripts/generate-trail-pages.js'

permissions:
  contents: write

jobs:
  generate-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate trail pages and sitemap
        run: node scripts/generate-trail-pages.js

      - name: Commit generated pages
        run: |
          git config user.name "dolopaws-bot"
          git config user.email "actions@github.com"
          git add trails/ sitemap.xml browse-trails.html
          git diff --cached --quiet || git commit -m "Regenerate static trail pages and sitemap"
          git pull --rebase origin main
          git push
