<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title id="pageTitle">Trail — DoloPaws</title>
<meta name="theme-color" content="#2E4034">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css"/>
</head>
<body>

<div class="topnav">
  <a class="brand" href="index.html"><img src="icon-192.png" alt="DoloPaws logo">DoloPaws</a>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="my-trails.html">Browse our trails</a>
    <a href="safety-guide.html">Dog safety guide</a>
    <button id="accountBtn" class="account-btn">My account</button>
  </div>
</div>

<div class="wrap" style="padding-top:28px;">
  <a href="javascript:history.back()" style="font-size:13px;font-weight:700;color:var(--accent);text-decoration:none;">← Back</a>

  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-top:14px;">
    <div>
      <div id="trailBadges" style="display:flex;gap:8px;margin-bottom:8px;"></div>
      <h1 id="trailName" style="font-size:clamp(26px,4vw,36px);">Loading trail…</h1>
      <div id="trailMeta" class="sub" style="margin-top:6px;"></div>
    </div>
    <button id="detailSaveBtn" class="fav-btn" style="font-size:13px;padding:9px 22px;">Save</button>
  </div>

  <div id="trailTags" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;"></div>

  <div id="quickFacts" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;margin-top:18px;padding:16px;background:var(--card);border:1px solid var(--paper-line);border-radius:12px;"></div>

  <div id="weatherWidget" style="margin-top:14px;padding:14px 16px;background:var(--sage-dim);border-radius:12px;font-size:13px;color:var(--ink);" hidden></div>
</div>

<div class="wrap" style="padding-top:20px;">
  <div id="trailDetailMap" style="width:100%;height:480px;border-radius:16px;border:1px solid var(--paper-line);background:var(--sage-dim);overflow:hidden;"></div>
  <div id="mapLegend" style="display:flex;gap:20px;margin-top:10px;font-size:12.5px;color:var(--ink-soft);flex-wrap:wrap;">
    <span>🏠 Rifugio</span>
    <span>💧 Drinking water</span>
    <span>🔀 Trail switch</span>
    <span>🚩 Recommended start</span>
    <span id="routeSwatch" style="width:16px;height:3px;background:#D6A038;display:inline-block;border-radius:2px;margin-right:4px;vertical-align:middle;"></span><span id="routeSwatchLabel">Trail route</span>
  </div>
</div>

<div class="wrap" id="directionsWrap" style="padding-top:20px;" hidden>
  <h2 style="font-size:18px;margin-bottom:10px;">Trail directions</h2>
  <ol id="trailDirections" style="margin:0;padding-left:22px;color:var(--ink);font-size:14px;line-height:1.9;"></ol>
</div>

<div class="wrap" style="padding-top:24px;padding-bottom:60px;display:grid;grid-template-columns:1fr 1fr;gap:32px;">
  <div>
    <h2 style="font-size:18px;margin-bottom:10px;">About this trail</h2>
    <p id="trailDesc" style="color:var(--ink-soft);font-size:14.5px;line-height:1.6;"></p>
    <p id="trailTips" style="color:var(--ink-soft);font-size:13.5px;line-height:1.6;margin-top:12px;font-style:italic;"></p>
    <p id="trailCoords" style="color:var(--ink-soft);font-size:12px;margin-top:12px;font-family:monospace;"></p>
  </div>
  <div>
    <h2 style="font-size:18px;margin-bottom:10px;">Trail details</h2>
    <div id="trailDetailContent" style="font-size:13.5px;color:var(--ink-soft);"></div>
  </div>
</div>

<footer class="site-footer">DoloPaws &#124; Dolomites trail guide for dogs and their humans.</footer>

<script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
<script type="module" src="firebase-init.js"></script>
<script src="auth-ui.js" defer></script>
<script src="breeds-data.js" defer></script>
<script src="trails-data.js" defer></script>
<script src="trail.js" defer></script>
</body>
</html>
